version: "3.9"

services:
  app:
    build: .
    container_name: task-scheduler
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - redis
      - rabbitmq
    environment:
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # UI
    restart: always